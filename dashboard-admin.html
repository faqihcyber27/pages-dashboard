<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body class="bg-[#020617] text-white">

<div id="app" class="p-4 space-y-4">

<!-- HEADER -->
<div class="flex justify-between items-center">
  <h1 class="text-xl font-bold">Admin Dashboard</h1>

  <div class="flex gap-2 items-center">

    <label class="btn-main cursor-pointer text-xs">
      Import Excel
      <input type="file" @change="importExcel" hidden accept=".xlsx,.xls"/>
    </label>

    <button @click="openForm" class="btn-main">+ Add VM</button>

    <button @click="logout" class="text-red-400 text-sm">
      Logout
    </button>

  </div>
</div>

<!-- 🔥 PROGRESS BAR -->
<div v-if="loading" class="bg-slate-900 border border-slate-800 p-3 rounded-xl">

  <div class="flex justify-between text-xs mb-1">
    <span>{{progressText}}</span>
    <span>{{progress}}%</span>
  </div>

  <div class="w-full bg-slate-700 rounded-full h-2">
    <div 
      class="bg-blue-500 h-2 rounded-full transition-all duration-300"
      :style="{width: progress + '%'}"
    ></div>
  </div>

</div>

<!-- LIST VM -->
<div class="space-y-3">

<div v-for="vm in vms" class="card">

<div class="flex justify-between">

<div>
<p class="font-semibold text-sm">{{vm.name}}</p>
<p class="text-xs text-slate-400">{{vm.ip}}</p>
</div>

<div class="flex gap-2">
<button @click="edit(vm)" class="text-blue-400">✏️</button>
<button @click="del(vm.id)" class="text-red-400">🗑️</button>
</div>

</div>

<div class="grid grid-cols-2 gap-2 mt-2 text-xs">
<div>CPU: {{vm.cpu}}</div>
<div>Mem: {{vm.memory}} GB</div>
<div>Env: {{vm.environment}}</div>
<div>Platform: {{vm.platform}}</div>
</div>

</div>

</div>

<!-- MODAL -->
<div v-if="showForm" class="fixed inset-0 bg-black/70 flex items-center justify-center p-4">

<div class="bg-slate-900 w-full max-w-lg rounded-xl p-4 space-y-3 border border-slate-800">

<h2 class="font-bold text-lg">
{{editMode ? "Edit VM" : "Add VM"}}
</h2>

<div class="grid grid-cols-2 gap-2">

<input v-model="form.name" placeholder="Name" class="input"/>
<input v-model="form.ip" placeholder="IP" class="input"/>

<select v-model="form.environment" class="input">
<option>PRODUCTION</option>
<option>GO-PRODUCTION</option>
</select>

<select v-model="form.platform" class="input">
<option>OLVM</option>
<option>VMWARE</option>
</select>

</div>

<div class="grid grid-cols-2 gap-2">

<input v-model="form.function" placeholder="Function" class="input"/>
<input v-model="form.cluster" placeholder="Cluster" class="input"/>

<input v-model="form.host" placeholder="Host" class="input col-span-2"/>

<input v-model="form.cpu" placeholder="CPU" class="input"/>
<input v-model="form.memory" placeholder="Memory (GB)" class="input"/>

</div>

<select v-model="form.os" class="input">
<option disabled value="">Select OS</option>

<option>Red Hat Enterprise Linux 7 (64-bit)</option>
<option>Red Hat Enterprise Linux 8 (64-bit)</option>
<option>Red Hat Enterprise Linux 9 (64-bit)</option>

<option>Microsoft Windows Server 2016 (64-bit)</option>
<option>Microsoft Windows Server 2019 (64-bit)</option>
<option>Microsoft Windows Server 2022 (64-bit)</option>
</select>

<input v-model="form.vlan" placeholder="VLAN" class="input"/>
<input v-model="form.storage" placeholder="Storage" class="input"/>

<!-- DISK -->
<div>
<p class="text-xs text-slate-400">Disk</p>

<div v-for="(d,i) in form.disk" class="flex gap-2">
<input v-model="form.disk[i]" class="input"/>
<button @click="removeDisk(i)" class="text-red-400">X</button>
</div>

<button @click="addDisk" class="text-blue-400 text-sm">
+ Add Disk
</button>
</div>

<div class="flex gap-2 pt-2">

<button @click="saveVM" class="btn-main flex-1">
Save
</button>

<button @click="showForm=false" class="text-red-400 text-sm">
Cancel
</button>

</div>

</div>
</div>

</div>

<script>
const API="https://worker-dashboard.jihadwajib68.workers.dev"

Vue.createApp({

data(){
return{
vms:[],
showForm:false,
editMode:false,
form:{disk:[]},

// 🔥 NEW STATE
loading:false,
progress:0,
progressText:""
}
},

mounted(){
this.loadVM()
},

methods:{

async loadVM(){
const r=await fetch(API+"/vms")
this.vms=await r.json()
},

openForm(){
this.editMode=false
this.form={disk:[]}
this.showForm=true
},

edit(vm){
this.editMode=true
this.form=JSON.parse(JSON.stringify(vm))
this.showForm=true
},

async saveVM(){

const url=this.editMode?API+"/vms/"+this.form.id:API+"/vms"

await fetch(url,{
method:this.editMode?"PUT":"POST",
headers:{
"Content-Type":"application/json",
"role":"admin"
},
body:JSON.stringify(this.form)
})

this.showForm=false
this.loadVM()
},

async del(id){
if(!confirm("Delete VM?")) return

await fetch(API+"/vms/"+id,{
method:"DELETE",
headers:{ "role":"admin" }
})

this.loadVM()
},

addDisk(){
this.form.disk.push("")
},

removeDisk(i){
this.form.disk.splice(i,1)
},

logout(){
localStorage.clear()
window.location="index.html"
},

// ================= IMPORT EXCEL (UPGRADED) =================
async importExcel(e){

const file = e.target.files[0]
if(!file) return

this.loading = true
this.progress = 0
this.progressText = "Reading file..."

const data = await file.arrayBuffer()
const workbook = XLSX.read(data)

const sheet = workbook.Sheets[workbook.SheetNames[0]]
const json = XLSX.utils.sheet_to_json(sheet)

this.progressText = "Processing..."

const payload = json.map(row=>{

let vm = {
name: row.name || "",
ip: row.ip || "",
environment: row.environment || "",
platform: row.platform || "",
function: row.function || "",
cluster: row.cluster || "",
host: row.host || "",
cpu: row.cpu !== undefined ? Number(row.cpu).toString().replace(".0","") : "",
memory: row.memory !== undefined ? Number(row.memory).toString().replace(".0","") : "",
os: row.os || "",
vlan: row.vlan || "",
storage: row.storage || "",
disk: []
}

Object.keys(row).forEach(k=>{
if(k.toLowerCase().includes("disk") && row[k]){
vm.disk.push(parseInt(row[k]))
}
})

return vm
})

// 🔥 CHUNK UPLOAD
const chunkSize = 500
let uploaded = 0

for(let i=0; i<payload.length; i+=chunkSize){

const chunk = payload.slice(i, i+chunkSize)

this.progressText = `Uploading ${uploaded}/${payload.length}`

await fetch(API+"/vms/bulk",{
method:"POST",
headers:{
"Content-Type":"application/json",
"role":"admin"
},
body:JSON.stringify(chunk)
})

uploaded += chunk.length

this.progress = Math.round((uploaded / payload.length) * 100)
}

// DONE
this.progressText = "Selesai 🚀"
this.progress = 100

setTimeout(()=>{
this.loading = false
},1000)

this.loadVM()

}

}

}).mount("#app")
</script>

<style>

.input{
width:100%;
padding:10px;
background:#020617;
border:1px solid #1e293b;
border-radius:8px;
}

.card{
background:linear-gradient(145deg,#020617,#020617);
border:1px solid #1e293b;
border-radius:12px;
padding:12px;
transition:0.2s;
}

.card:hover{
border-color:#2563eb;
}

.btn-main{
background:#2563eb;
padding:10px;
border-radius:8px;
font-size:12px;
}

</style>

</body>
</html>
