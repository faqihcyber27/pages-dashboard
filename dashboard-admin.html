<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#020617] text-white">

<div id="app" class="p-4 space-y-4">

<!-- HEADER -->
<div class="flex justify-between items-center">
  <h1 class="text-xl font-bold">Admin Dashboard</h1>

  <button @click="logout" class="text-xs text-red-400">
    Logout
  </button>
</div>

<!-- ACTION -->
<div class="flex gap-2">
  <button @click="openForm" class="btn-main flex-1">+ Add VM</button>
  <button @click="exportCSV" class="btn-secondary">Export</button>
  <input type="file" @change="importCSV" class="text-xs"/>
</div>

<!-- LIST -->
<div class="space-y-3">

<div v-for="vm in vms" class="card">

<div class="flex justify-between">

<div>
<p class="font-semibold text-sm">{{vm.name}}</p>
<p class="text-xs text-slate-400">{{vm.ip}}</p>
</div>

<div class="flex gap-2">
<button @click="edit(vm)">✏️</button>
<button @click="del(vm.id)">🗑️</button>
</div>

</div>

<div class="grid grid-cols-2 gap-2 text-xs mt-3">

<div><span class="label">Env</span>{{vm.environment}}</div>
<div><span class="label">Platform</span>{{vm.platform}}</div>

<div><span class="label">CPU</span>{{vm.cpu}}</div>
<div><span class="label">Memory</span>{{vm.memory}}</div>

<div><span class="label">Cluster</span>{{vm.cluster}}</div>
<div><span class="label">Host</span>{{vm.host}}</div>

<div><span class="label">OS</span>{{vm.os}}</div>
<div><span class="label">Storage</span>{{vm.storage}}</div>

</div>

<div class="flex gap-1 mt-2">
<span v-for="d in vm.disk" class="disk">{{d}}</span>
</div>

</div>

</div>

<!-- MODAL -->
<div v-if="showForm" class="fixed inset-0 bg-black/70 flex items-center justify-center">

<div class="bg-slate-900 p-4 rounded-xl w-full max-w-md space-y-2">

<input v-model="form.name" placeholder="Name" class="input"/>
<input v-model="form.ip" placeholder="IP" class="input"/>

<select v-model="form.environment" class="input">
<option>PRODUCTION</option>
<option>GO-PRODUCTION</option>
</select>

<select v-model="form.platform" class="input">
<option>OLVM</option>
<option>VMWARE</option>
</select>

<input v-model="form.function" placeholder="Function" class="input"/>
<input v-model="form.cluster" placeholder="Cluster" class="input"/>
<input v-model="form.host" placeholder="Host" class="input"/>
<input v-model="form.cpu" placeholder="CPU" class="input"/>
<input v-model="form.memory" placeholder="Memory" class="input"/>
<input v-model="form.os" placeholder="OS" class="input"/>
<input v-model="form.vlan" placeholder="VLAN" class="input"/>
<input v-model="form.storage" placeholder="Storage" class="input"/>

<div v-for="(d,i) in form.disk" class="flex gap-2">
<input v-model="form.disk[i]" class="input"/>
<button @click="removeDisk(i)">X</button>
</div>

<button @click="addDisk">+ Disk</button>

<button @click="saveVM" class="btn-main">Save</button>

</div>
</div>

</div>

<script>
const API="https://worker-dashboard.jihadwajib68.workers.dev"

Vue.createApp({

data(){
return{
vms:[],
showForm:false,
editMode:false,
form:{disk:[]}
}
},

mounted(){this.loadVM()},

methods:{

async loadVM(){
const r=await fetch(API+"/vms")
this.vms=await r.json()
},

openForm(){
this.form={disk:[]}
this.editMode=false
this.showForm=true
},

edit(vm){
this.form=JSON.parse(JSON.stringify(vm))
this.editMode=true
this.showForm=true
},

async saveVM(){

const url=this.editMode?API+"/vms/"+this.form.id:API+"/vms"

await fetch(url,{
method:this.editMode?"PUT":"POST",
headers:{
"Content-Type":"application/json",
"role":"admin"
},
body:JSON.stringify(this.form)
})

this.showForm=false
this.loadVM()
},

async del(id){
await fetch(API+"/vms/"+id,{
method:"DELETE",
headers:{ "role":"admin" }
})
this.loadVM()
},

addDisk(){this.form.disk.push("")},
removeDisk(i){this.form.disk.splice(i,1)},

// EXPORT
exportCSV(){
let csv="name,ip,environment,platform,function,cluster,host,cpu,memory,os,vlan,storage,disk\n"

this.vms.forEach(vm=>{
const disk=(vm.disk||[]).join("|")
csv+=`${vm.name},${vm.ip},${vm.environment},${vm.platform},${vm.function},${vm.cluster},${vm.host},${vm.cpu},${vm.memory},${vm.os},${vm.vlan},${vm.storage},${disk}\n`
})

const blob=new Blob([csv])
const url=URL.createObjectURL(blob)
const a=document.createElement("a")
a.href=url
a.download="vm.csv"
a.click()
},

// IMPORT
importCSV(e){
const file=e.target.files[0]
const reader=new FileReader()

reader.onload=async (ev)=>{
const rows=ev.target.result.split("\n").map(r=>r.split(","))
const headers=rows[0]

for(let i=1;i<rows.length;i++){
const row=rows[i]
if(!row[0]) continue

let vm={}
headers.forEach((h,idx)=>{
vm[h]=row[idx]
})

vm.disk=[]
headers.forEach((h,idx)=>{
if(h.includes("disk") && row[idx]) vm.disk.push(row[idx])
})

await fetch(API+"/vms",{
method:"POST",
headers:{
"Content-Type":"application/json",
"role":"admin"
},
body:JSON.stringify(vm)
})
}

alert("Import selesai")
this.loadVM()
}

reader.readAsText(file)
},

logout(){
localStorage.clear()
window.location="index.html"
}

}

}).mount("#app")
</script>

<style>
.input{width:100%;padding:10px;background:#020617;border:1px solid #1e293b;border-radius:8px}
.btn-main{background:#2563eb;padding:10px;border-radius:8px}
.btn-secondary{background:#334155;padding:10px;border-radius:8px}
.card{background:#020617;border:1px solid #1e293b;border-radius:12px;padding:12px}
.label{font-size:10px;color:#64748b}
.disk{border:1px solid #334155;padding:2px 6px;border-radius:6px;font-size:10px}
</style>

</body>
</html>
