<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#020617] text-white">

<div id="app" class="p-4 space-y-4">

<!-- HEADER -->
<div class="flex justify-between items-center">
  <h1 class="text-lg font-bold">Admin Dashboard</h1>

  <button @click="logout" class="text-xs text-red-400">
    Logout
  </button>
</div>

<!-- ADD BUTTON -->
<button @click="openForm" class="btn w-full">
+ Add VM
</button>

<!-- TABLE -->
<div class="table-wrap">

<table class="table">

<thead>
<tr>
<th>VM</th>
<th>ENV</th>
<th>PLATFORM</th>
<th>CPU</th>
<th>MEM</th>
<th>CLUSTER</th>
<th>HOST</th>
<th>OS</th>
<th>DISK</th>
<th>ACT</th>
</tr>
</thead>

<tbody>

<tr v-for="vm in vms">

<td>
<p class="font-semibold">{{vm.name}}</p>
<p class="text-[10px] text-slate-400">{{vm.ip}}</p>
</td>

<td>{{vm.environment}}</td>
<td class="text-blue-400">{{vm.platform}}</td>

<td>{{vm.cpu}}</td>
<td>{{vm.memory}}</td>

<td>{{vm.cluster}}</td>
<td class="text-xs">{{vm.host}}</td>

<td class="text-xs">{{vm.os}}</td>

<td>
<div class="flex flex-wrap gap-1">
<span v-for="(d,i) in vm.disk" class="disk">
D{{i+1}}: {{d}}
</span>
</div>
</td>

<td class="flex gap-1">
<button @click="edit(vm)" class="edit">✏️</button>
<button @click="del(vm.id)" class="del">🗑️</button>
</td>

</tr>

</tbody>

</table>
</div>

<!-- MODAL -->
<div v-if="showForm" class="fixed inset-0 bg-black/70 flex items-center justify-center">

<div class="bg-slate-900 p-4 rounded-xl w-full max-w-md space-y-2">

<h2 class="font-bold">{{editMode?'Edit':'Add'}} VM</h2>

<input v-model="form.name" placeholder="Name" class="input"/>
<input v-model="form.ip" placeholder="IP" class="input"/>

<select v-model="form.environment" class="input">
<option>PRODUCTION</option>
<option>GO-PRODUCTION</option>
</select>

<select v-model="form.platform" class="input">
<option>OLVM</option>
<option>VMWARE</option>
</select>

<select v-model="form.os" class="input">
<option>Red Hat Enterprise Linux 7 (64-bit)</option>
<option>Red Hat Enterprise Linux 8 (64-bit)</option>
<option>Red Hat Enterprise Linux 9 (64-bit)</option>
<option>Microsoft Windows Server 2016 (64-bit)</option>
<option>Microsoft Windows Server 2019 (64-bit)</option>
<option>Microsoft Windows Server 2022 (64-bit)</option>
</select>

<input v-model="form.function" placeholder="Function" class="input"/>
<input v-model="form.cluster" placeholder="Cluster" class="input"/>
<input v-model="form.host" placeholder="Host" class="input"/>
<input v-model="form.cpu" placeholder="CPU" class="input"/>
<input v-model="form.memory" placeholder="Memory (GB)" class="input"/>
<input v-model="form.vlan" placeholder="VLAN" class="input"/>
<input v-model="form.storage" placeholder="Storage" class="input"/>

<!-- DISK -->
<div>
<p class="text-xs text-slate-400">Disk</p>

<div v-for="(d,i) in form.disk" class="flex gap-2 mt-1">
<input v-model="form.disk[i]" class="input"/>
<button @click="removeDisk(i)">X</button>
</div>

<button @click="addDisk" class="text-blue-400 text-sm mt-1">
+ Add Disk
</button>
</div>

<button @click="saveVM" class="btn">Save</button>
<button @click="showForm=false" class="text-red-400 text-sm">Close</button>

</div>
</div>

</div>

<script>
const API="https://worker-dashboard.jihadwajib68.workers.dev"

Vue.createApp({

data(){
return{
vms:[],
showForm:false,
editMode:false,
form:{disk:[]}
}
},

mounted(){
this.loadVM()
},

methods:{

async loadVM(){
const r=await fetch(API+"/vms")
this.vms=await r.json()
},

openForm(){
this.editMode=false
this.form={disk:[]}
this.showForm=true
},

edit(vm){
this.editMode=true
this.form=JSON.parse(JSON.stringify(vm))
this.showForm=true
},

async saveVM(){

const url=this.editMode?API+"/vms/"+this.form.id:API+"/vms"

await fetch(url,{
method:this.editMode?"PUT":"POST",
headers:{
"Content-Type":"application/json",
"role":"admin"
},
body:JSON.stringify(this.form)
})

this.showForm=false
this.loadVM()
},

async del(id){
if(!confirm("Delete VM?")) return

await fetch(API+"/vms/"+id,{
method:"DELETE",
headers:{ "role":"admin" }
})

this.loadVM()
},

addDisk(){
this.form.disk.push("")
},

removeDisk(i){
this.form.disk.splice(i,1)
},

logout(){
localStorage.clear()
window.location="index.html"
}

}

}).mount("#app")
</script>

<style>
.input{
width:100%;
padding:10px;
background:#020617;
border:1px solid #1e293b;
border-radius:8px;
}

.btn{
background:#2563eb;
padding:10px;
border-radius:8px;
width:100%;
}

.table-wrap{
background:#020617;
border-radius:12px;
border:1px solid #1e293b;
overflow:auto;
}

.table{
width:100%;
font-size:11px;
}

th{
padding:10px;
color:#94a3b8;
}

td{
padding:10px;
border-top:1px solid #1e293b;
}

.disk{
background:#020617;
border:1px solid #334155;
padding:2px 6px;
border-radius:6px;
font-size:10px;
}

.edit{color:#3b82f6}
.del{color:#ef4444}
</style>

</body>
</html>
