<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white">

<div id="app" class="min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-sm bg-slate-900 p-6 rounded-2xl space-y-5 shadow-xl">

    <h1 class="text-2xl font-bold text-center">
      {{ isLogin ? "Login" : "Register" }}
    </h1>

    <!-- LOGIN -->
    <div v-if="isLogin" class="space-y-4">
      <input v-model="email" placeholder="Email" class="input"/>
      <input v-model="password" type="password" placeholder="Password" class="input"/>

      <button @click="login" class="btn">Login</button>

      <p class="text-center text-sm text-slate-400">
        Belum punya akun?
        <span @click="isLogin=false" class="text-blue-400 cursor-pointer">Register</span>
      </p>
    </div>

    <!-- REGISTER -->
    <div v-else class="space-y-4">
      <input v-model="name" placeholder="Full Name" class="input"/>
      <input v-model="email" placeholder="Email" class="input"/>
      <input v-model="password" type="password" placeholder="Password" class="input"/>

      <button @click="register" class="btn">Register</button>

      <p class="text-center text-sm text-slate-400">
        Sudah punya akun?
        <span @click="isLogin=true" class="text-blue-400 cursor-pointer">Login</span>
      </p>
    </div>

  </div>

</div>

<script>
const API = "https://worker-dashboard.jihadwajib68.workers.dev"

Vue.createApp({
data() {
return {
  isLogin: true,
  name: "",
  email: "",
  password: ""
}
},

async mounted() {
  const token = localStorage.getItem("token")
  if (!token) return

  try {
    const res = await fetch(API + "/api/me", {
      headers: {
        Authorization: "Bearer " + token
      }
    })

    if (res.ok) {
      window.location = "dashboard.html"
    } else {
      localStorage.clear()
    }

  } catch {
    localStorage.clear()
  }
},

methods: {

async login() {
  if (!this.email || !this.password) {
    alert("Isi email & password")
    return
  }

  try {
    const res = await fetch(API + "/api/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email: this.email,
        password: this.password
      })
    })

    const data = await res.json()
    console.log("LOGIN:", data)

    if (!res.ok) {
      alert(data.error || "Login gagal")
      return
    }

    localStorage.setItem("token", data.token)
    localStorage.setItem("role", data.role)

    alert("Login berhasil")

    window.location = "dashboard.html"

  } catch (err) {
    alert("Server error")
  }
},

async register() {
  if (!this.name || !this.email || !this.password) {
    alert("Lengkapi semua field")
    return
  }

  try {
    const res = await fetch(API + "/api/register", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name: this.name,
        email: this.email,
        password: this.password
      })
    })

    const data = await res.json()
    console.log("REGISTER:", data)

    if (!res.ok) {
      alert(data.error || "Register gagal")
      return
    }

    alert("Register berhasil!")
    this.isLogin = true

  } catch {
    alert("Server error")
  }
}

}

}).mount("#app")
</script>

<style>
.input{
  width:100%;
  padding:12px;
  background:#020617;
  border:1px solid #1e293b;
  border-radius:10px;
}
.btn{
  width:100%;
  background:#2563eb;
  padding:12px;
  border-radius:10px;
  font-weight:bold;
}
</style>

</body>
</html>
