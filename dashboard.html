<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-950 text-white">

<div id="app" class="p-4 space-y-4">

  <!-- HEADER -->
  <div class="flex justify-between items-center">
    <div>
      <h1 class="text-xl font-bold">Dashboard</h1>
      <p class="text-sm text-slate-400">Welcome, {{ user.name }}</p>
    </div>

    <button @click="logout" class="text-red-400 text-sm">
      Logout
    </button>
  </div>

  <!-- SEARCH -->
  <input v-model="search" placeholder="Search VM / IP..." class="input w-full"/>

  <!-- EMPTY STATE -->
  <div class="text-center text-slate-500 mt-10">
    Belum ada data VM 🚀
  </div>

</div>

<script>
const { createApp } = Vue

createApp({
  data() {
    return {
      user: {},
      search: ""
    }
  },

  mounted() {
    const data = localStorage.getItem("user")

    if (!data) {
      window.location.href = "index.html"
      return
    }

    this.user = JSON.parse(data)
  },

  methods: {

    logout() {
      localStorage.clear()
      window.location.href = "index.html"
    }

  }
}).mount("#app")
</script>

<style>
.input{
  padding:12px;
  background:#020617;
  border:1px solid #1e293b;
  border-radius:10px;
}
</style>

</body>
</html>
