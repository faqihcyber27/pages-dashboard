<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#020617] text-white">

<div id="app" class="flex min-h-screen">

<!-- SIDEBAR -->
<div class="w-16 bg-[#020617] border-r border-slate-800 flex flex-col items-center py-4">
⚡
</div>

<!-- MAIN -->
<div class="flex-1 p-4 space-y-4">

<!-- TOP BAR -->
<div class="flex gap-2">

<input v-model="search" placeholder="Search VM / IP..."
class="input flex-1"/>

<label class="file">
📂 CSV
<input type="file" @change="importCSV" hidden>
</label>

</div>

<!-- SUMMARY -->
<div class="grid grid-cols-3 gap-3">

<div class="card">
<p>Total</p>
<p class="text-xl font-bold">{{vms.length}}</p>
</div>

<div class="card border border-green-500/40">
<p>PROD</p>
<p class="text-xl text-green-400">{{countEnv('PRODUCTION')}}</p>
</div>

<div class="card border border-yellow-500/40">
<p>GO-PROD</p>
<p class="text-xl text-yellow-400">{{countEnv('GO-PRODUCTION')}}</p>
</div>

</div>

<!-- FILTER -->
<div class="flex gap-2 text-xs">

<button @click="filterEnv='ALL'" :class="chip('ALL')">ALL</button>
<button @click="filterEnv='PRODUCTION'" :class="chip('PRODUCTION')">PROD</button>
<button @click="filterEnv='GO-PRODUCTION'" :class="chip('GO-PRODUCTION')">GO-PROD</button>

</div>

<!-- ADD -->
<button @click="openForm" class="btn">
+ Add VM
</button>

<!-- TABLE -->
<div class="table-wrap">

<table class="table">

<thead>
<tr>
<th>VM</th>
<th>ENV</th>
<th>PLATFORM</th>
<th>CPU</th>
<th>MEM</th>
<th>DISK</th>
<th>ACT</th>
</tr>
</thead>

<tbody>

<tr v-for="vm in filteredVMs">

<td>
<p class="font-semibold">{{vm.name}}</p>
<p class="text-[10px] text-slate-400">{{vm.ip}}</p>
</td>

<td>
<span class="badge"
:class="{
'bg-green-500/20 text-green-400': vm.environment==='PRODUCTION',
'bg-yellow-500/20 text-yellow-400': vm.environment==='GO-PRODUCTION'
}">
{{vm.environment}}
</span>
</td>

<td class="text-blue-400">{{vm.platform}}</td>

<td class="font-bold">{{vm.cpu}}</td>
<td>{{vm.memory}}</td>

<td>
<div class="flex flex-wrap gap-1">
<span v-for="(d,i) in vm.disk" class="disk">
{{d}}
</span>
</div>
</td>

<td>
<button @click="edit(vm)" class="edit">Edit</button>
<button @click="del(vm.id)" class="del">X</button>
</td>

</tr>

</tbody>

</table>

</div>

</div>
</div>

<script>
const API="https://worker-dashboard.jihadwajib68.workers.dev"
const {createApp}=Vue

createApp({

data(){
return{
vms:[],
search:"",
filterEnv:"ALL"
}
},

computed:{
filteredVMs(){
return this.vms.filter(v=>{
return (
(v.name||"").toLowerCase().includes(this.search.toLowerCase()) &&
(this.filterEnv==="ALL"||v.environment===this.filterEnv)
)
})
}
},

mounted(){this.loadVM()},

methods:{

async loadVM(){
const r=await fetch(API+"/vms")
this.vms=await r.json()
},

countEnv(e){
return this.vms.filter(v=>v.environment===e).length
},

chip(e){
return this.filterEnv===e
? "chip active"
: "chip"
},

openForm(){alert("modal next step")},
edit(){alert("edit next step")},
del(){alert("delete next step")}

}

}).mount("#app")
</script>

<style>
.input{
padding:10px;
background:#020617;
border:1px solid #1e293b;
border-radius:8px;
}

.btn{
background:linear-gradient(90deg,#2563eb,#1d4ed8);
padding:12px;
border-radius:10px;
font-weight:bold;
}

.card{
background:#020617;
padding:12px;
border-radius:12px;
border:1px solid #1e293b;
}

.table-wrap{
background:#020617;
border-radius:12px;
overflow:hidden;
border:1px solid #1e293b;
}

.table{
width:100%;
font-size:12px;
}

th{
text-align:left;
padding:10px;
color:#94a3b8;
background:#020617;
}

td{
padding:10px;
border-top:1px solid #1e293b;
}

tr:hover{
background:#020617cc;
}

.badge{
padding:4px 8px;
border-radius:6px;
font-size:10px;
}

.disk{
background:#020617;
border:1px solid #334155;
padding:2px 6px;
border-radius:6px;
font-size:10px;
}

.edit{color:#3b82f6}
.del{color:#ef4444}

.chip{
padding:6px 10px;
background:#020617;
border-radius:6px;
border:1px solid #1e293b;
}

.active{
background:#2563eb;
}

.file{
background:#020617;
padding:10px;
border-radius:8px;
border:1px solid #1e293b;
}
</style>

</body>
</html>
