<!DOCTYPE html>
<html>
<head>
<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white p-6">

<div id="app">

<div class="flex justify-between mb-4">
<input v-model="search" @input="loadVM" placeholder="Search..." class="input w-1/3"/>

<button v-if="role==='admin'" @click="addVM" class="btn px-4">+ Add</button>
</div>

<table class="w-full text-sm">
<tr><th>Name</th><th>IP</th><th>Cluster</th><th v-if="role==='admin'">Action</th></tr>

<tr v-for="vm in vms">
<td>{{vm.name}}</td>
<td>{{vm.ip}}</td>
<td>{{vm.cluster}}</td>

<td v-if="role==='admin'">
<button @click="editVM(vm)">Edit</button>
<button @click="deleteVM(vm.id)" class="text-red-400">Delete</button>
</td>
</tr>
</table>

</div>

<script>
const API="https://worker-dashboard.jihadwajib68.workers.dev"

Vue.createApp({
data(){
return{
vms:[],
search:"",
role:localStorage.getItem("role")
}
},

methods:{
async loadVM(){
const token=localStorage.getItem("token")
const res=await fetch(API+"/api/vms?q="+this.search,{
headers:{Authorization:"Bearer "+token}
})
this.vms=await res.json()
},

async addVM(){
const token=localStorage.getItem("token")

await fetch(API+"/api/vms",{
method:"POST",
headers:{Authorization:"Bearer "+token},
body:JSON.stringify({
name:"vm-new",
ip:"10.0.0.1",
cluster:"A"
})
})

this.loadVM()
},

async editVM(vm){
const token=localStorage.getItem("token")

await fetch(API+"/api/vms/"+vm.id,{
method:"PUT",
headers:{Authorization:"Bearer "+token},
body:JSON.stringify(vm)
})

this.loadVM()
},

async deleteVM(id){
const token=localStorage.getItem("token")

await fetch(API+"/api/vms/"+id,{
method:"DELETE",
headers:{Authorization:"Bearer "+token}
})

this.loadVM()
}
},

mounted(){
this.loadVM()
}
}).mount("#app")
</script>

<style>
.input{padding:10px;background:#020617;border:1px solid #1e293b;border-radius:8px}
.btn{background:#2563eb;padding:10px;border-radius:8px}
</style>

</body>
</html>
