<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#020617] text-white">

<div id="app" class="flex min-h-screen">

<!-- SIDEBAR -->
<div class="w-16 border-r border-slate-800 flex items-center justify-center text-xl">
⚡
</div>

<!-- MAIN -->
<div class="flex-1 p-4 space-y-4">

<!-- TOP -->
<div class="flex gap-2">
<input v-model="search" class="input flex-1" placeholder="Search VM / IP"/>

<button v-if="user.role==='admin'" @click="openForm" class="btn">
+ Add VM
</button>
</div>

<!-- FILTER -->
<div class="flex gap-2 text-xs">
<button @click="filterEnv='ALL'" :class="chip('ALL')">ALL</button>
<button @click="filterEnv='PRODUCTION'" :class="chip('PRODUCTION')">PROD</button>
<button @click="filterEnv='GO-PRODUCTION'" :class="chip('GO-PRODUCTION')">GO-PROD</button>
</div>

<!-- TABLE -->
<div class="table-wrap">

<table class="table">

<thead>
<tr>
<th>VM</th>
<th>ENV</th>
<th>PLATFORM</th>
<th>FUNCTION</th>
<th>CPU</th>
<th>MEM</th>
<th>CLUSTER</th>
<th>HOST</th>
<th>OS</th>
<th>VLAN</th>
<th>STORAGE</th>
<th>DISK</th>
<th v-if="user.role==='admin'">ACT</th>
</tr>
</thead>

<tbody>

<tr v-for="vm in filteredVMs">

<td>
<p class="font-semibold">{{vm.name}}</p>
<p class="text-[10px] text-slate-400">{{vm.ip}}</p>
</td>

<td>
<span class="badge"
:class="vm.environment==='PRODUCTION'?'prod':'goprod'">
{{vm.environment}}
</span>
</td>

<td class="blue">{{vm.platform}}</td>
<td>{{vm.function}}</td>

<td class="bold">{{vm.cpu}}</td>
<td>{{vm.memory}}</td>

<td>{{vm.cluster}}</td>
<td class="small">{{vm.host}}</td>
<td class="small">{{vm.os}}</td>
<td>{{vm.vlan}}</td>
<td>{{vm.storage}}</td>

<td>
<div class="flex flex-wrap gap-1">
<span v-for="(d,i) in vm.disk" class="disk">
Disk {{i+1}}: {{d}}
</span>
</div>
</td>

<td v-if="user.role==='admin'" class="flex gap-1">
<button @click="edit(vm)" class="edit">✏️</button>
<button @click="del(vm.id)" class="del">🗑️</button>
</td>

</tr>

</tbody>

</table>

</div>

<!-- MODAL -->
<div v-if="showForm" class="fixed inset-0 bg-black/70 flex items-center justify-center">

<div class="bg-slate-900 p-4 rounded-xl w-80 space-y-2">

<h2 class="font-bold">{{editMode?'Edit':'Add'}} VM</h2>

<input v-model="form.name" placeholder="Name" class="input"/>
<input v-model="form.ip" placeholder="IP" class="input"/>

<select v-model="form.environment" class="input">
<option>PRODUCTION</option>
<option>GO-PRODUCTION</option>
</select>

<select v-model="form.platform" class="input">
<option>OLVM</option>
<option>VMWARE</option>
</select>

<select v-model="form.os" class="input">
<option>Red Hat Enterprise Linux 7 (64-bit)</option>
<option>Red Hat Enterprise Linux 8 (64-bit)</option>
<option>Red Hat Enterprise Linux 9 (64-bit)</option>
<option>Microsoft Windows Server 2016 (64-bit)</option>
<option>Microsoft Windows Server 2019 (64-bit)</option>
<option>Microsoft Windows Server 2022 (64-bit)</option>
</select>

<input v-model="form.function" placeholder="Function" class="input"/>
<input v-model="form.cluster" placeholder="Cluster" class="input"/>
<input v-model="form.host" placeholder="Host" class="input"/>
<input v-model="form.cpu" placeholder="CPU" class="input"/>
<input v-model="form.memory" placeholder="Memory" class="input"/>
<input v-model="form.vlan" placeholder="VLAN" class="input"/>
<input v-model="form.storage" placeholder="Storage" class="input"/>

<!-- DISK -->
<div v-for="(d,i) in form.disk" class="flex gap-2">
<input v-model="form.disk[i]" class="input"/>
<button @click="removeDisk(i)">X</button>
</div>

<button @click="addDisk" class="text-blue-400 text-sm">+ Disk</button>

<button @click="saveVM" class="btn">Save</button>
<button @click="showForm=false" class="text-red-400 text-sm">Close</button>

</div>
</div>

</div>
</div>

<script>
const API="https://worker-dashboard.jihadwajib68.workers.dev"
const {createApp}=Vue

createApp({

data(){
return{
user:{
  role: localStorage.getItem("role") || "user"
},
vms:[],
search:"",
filterEnv:"ALL",
showForm:false,
editMode:false,
form:{disk:[]}
}
},

computed:{
filteredVMs(){
return this.vms.filter(v=>{
return (
(v.name||"").toLowerCase().includes(this.search.toLowerCase()) ||
(v.ip||"").includes(this.search)
) &&
(this.filterEnv==="ALL" || v.environment===this.filterEnv)
})
}
},

mounted(){this.loadVM()},

methods:{

async loadVM(){
const r=await fetch(API+"/vms")
this.vms=await r.json()
},

chip(e){
return this.filterEnv===e ? "chip active":"chip"
},

openForm(){
this.editMode=false
this.form={disk:[]}
this.showForm=true
},

edit(vm){
this.editMode=true
this.form=JSON.parse(JSON.stringify(vm))
this.showForm=true
},

async saveVM(){

const options={
method:this.editMode?"PUT":"POST",
headers:{
"Content-Type":"application/json",
"role":this.user.role
},
body:JSON.stringify(this.form)
}

const url=this.editMode?API+"/vms/"+this.form.id:API+"/vms"

await fetch(url,options)

this.showForm=false
this.loadVM()
},

async del(id){
if(!confirm("Delete VM?")) return

await fetch(API+"/vms/"+id,{
method:"DELETE",
headers:{ "role":this.user.role }
})

this.loadVM()
},

addDisk(){this.form.disk.push("")},
removeDisk(i){this.form.disk.splice(i,1)}

}

}).mount("#app")
</script>

<style>
.input{padding:10px;background:#020617;border:1px solid #1e293b;border-radius:8px;width:100%}
.btn{background:#2563eb;padding:10px;border-radius:8px;width:100%}
.table-wrap{background:#020617;border-radius:12px;overflow:hidden;border:1px solid #1e293b}
.table{width:100%;font-size:11px}
th{padding:10px;color:#94a3b8;background:#020617;position:sticky;top:0}
td{padding:10px;border-top:1px solid #1e293b}
.badge{padding:4px 8px;border-radius:6px;font-size:10px}
.prod{background:#022c22;color:#4ade80}
.goprod{background:#3f1d02;color:#facc15}
.disk{background:#020617;border:1px solid #334155;padding:2px 6px;border-radius:6px;font-size:10px}
.edit{color:#3b82f6}
.del{color:#ef4444}
.chip{padding:6px 10px;background:#020617;border-radius:6px;border:1px solid #1e293b}
.active{background:#2563eb}
.blue{color:#60a5fa}
.bold{font-weight:bold}
.small{font-size:10px}
</style>

</body>
</html>
