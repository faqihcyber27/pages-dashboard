<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white">

<div id="app" class="flex min-h-screen">

<!-- SIDEBAR -->
<div class="w-20 bg-slate-900 flex flex-col items-center py-4">
⚡
</div>

<!-- MAIN -->
<div class="flex-1 p-4 space-y-4">

<!-- TOP -->
<div class="flex justify-between">
<input v-model="search" class="input w-2/3" placeholder="Search"/>
<input type="file" @change="importCSV"/>
</div>

<!-- FILTER -->
<div class="flex gap-2">
<button @click="filterEnv='ALL'" class="chip">ALL</button>
<button @click="filterEnv='PRODUCTION'" class="chip">PROD</button>
<button @click="filterEnv='GO-PRODUCTION'" class="chip">GO-PROD</button>
</div>

<button @click="openForm()" class="btn">+ Add VM</button>

<!-- FORM MODAL -->
<div v-if="showForm" class="fixed inset-0 bg-black/70 flex items-center justify-center">

<div class="bg-slate-900 p-4 rounded-xl w-80 space-y-2">

<h2 class="font-bold">{{editMode?"Edit":"Add"}} VM</h2>

<input v-model="form.name" placeholder="Name" class="input"/>
<input v-model="form.ip" placeholder="IP" class="input"/>

<select v-model="form.environment" class="input">
<option>PRODUCTION</option>
<option>GO-PRODUCTION</option>
</select>

<select v-model="form.platform" class="input">
<option>OLVM</option>
<option>VMWARE</option>
</select>

<input v-model="form.function" placeholder="Function" class="input"/>
<input v-model="form.cluster" placeholder="Cluster" class="input"/>
<input v-model="form.host" placeholder="Host" class="input"/>
<input v-model="form.cpu" placeholder="CPU" class="input"/>
<input v-model="form.memory" placeholder="Memory" class="input"/>
<input v-model="form.os" placeholder="OS" class="input"/>
<input v-model="form.vlan" placeholder="VLAN" class="input"/>
<input v-model="form.storage" placeholder="Storage" class="input"/>

<div v-for="(d,i) in form.disk" class="flex gap-2">
<input v-model="form.disk[i]" class="input"/>
<button @click="removeDisk(i)">X</button>
</div>

<button @click="addDisk">+ Disk</button>

<button @click="saveVM" class="btn">Save</button>
<button @click="showForm=false" class="text-red-400 text-sm">Close</button>

</div>
</div>

<!-- TABLE -->
<table class="w-full text-xs bg-slate-900 rounded-xl">

<tr class="bg-slate-800">
<th>Name</th><th>Env</th><th>Platform</th><th>CPU</th><th>Mem</th><th>Disk</th><th>Action</th>
</tr>

<tr v-for="vm in filteredVMs">
<td>{{vm.name}}<br><span class="text-[10px]">{{vm.ip}}</span></td>
<td>{{vm.environment}}</td>
<td>{{vm.platform}}</td>
<td>{{vm.cpu}}</td>
<td>{{vm.memory}}</td>
<td>
<span v-for="(d,i) in vm.disk">{{d}} </span>
</td>
<td>
<button @click="edit(vm)">Edit</button>
<button @click="del(vm.id)" class="text-red-400">X</button>
</td>
</tr>

</table>

</div>

</div>

<script>
const API="https://worker-dashboard.jihadwajib68.workers.dev"
const {createApp}=Vue

createApp({

data(){
return{
vms:[],
search:"",
filterEnv:"ALL",
showForm:false,
editMode:false,
form:{disk:[]}
}
},

computed:{
filteredVMs(){
return this.vms.filter(v=>{
return (
(v.name||"").toLowerCase().includes(this.search.toLowerCase()) &&
(this.filterEnv==="ALL"||v.environment===this.filterEnv)
)
})
}
},

mounted(){this.loadVM()},

methods:{

async loadVM(){
const r=await fetch(API+"/vms")
this.vms=await r.json()
},

openForm(){
this.editMode=false
this.form={disk:[]}
this.showForm=true
},

edit(vm){
this.editMode=true
this.form={...vm}
this.showForm=true
},

async saveVM(){

if(this.editMode){
await fetch(API+"/vms/"+this.form.id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(this.form)
})
}else{
await fetch(API+"/vms",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(this.form)
})
}

this.showForm=false
this.loadVM()
},

async del(id){
await fetch(API+"/vms/"+id,{method:"DELETE"})
this.loadVM()
},

addDisk(){this.form.disk.push("")},
removeDisk(i){this.form.disk.splice(i,1)},

// 🔥 IMPORT CSV
importCSV(e){
const file=e.target.files[0]
const reader=new FileReader()

reader.onload=async (ev)=>{
const rows=ev.target.result.split("\n")

for(let r of rows){
const c=r.split(",")

await fetch(API+"/vms",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:c[0],
ip:c[1],
environment:c[2],
platform:c[3],
cpu:c[4],
memory:c[5],
disk:[c[6]]
})
})
}

this.loadVM()
}

reader.readAsText(file)
}

}

}).mount("#app")
</script>

<style>
.input{padding:10px;background:#020617;border:1px solid #1e293b;border-radius:8px;width:100%}
.btn{background:#2563eb;padding:10px;border-radius:8px;width:100%}
.chip{background:#020617;padding:6px;border-radius:6px}
</style>

</body>
</html>
