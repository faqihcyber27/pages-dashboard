<!DOCTYPE html>
<html>
<head>
  <script src="https://unpkg.com/vue@3"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white">

<div id="app" class="p-6">

  <div class="flex justify-between mb-4">
    <input v-model="search" placeholder="Search IP / VM..." class="input w-1/3"/>

    <button v-if="role==='admin'" @click="addVM" class="btn w-auto px-4">
      + Add VM
    </button>
  </div>

  <table class="w-full text-sm">
    <tr>
      <th>Name</th>
      <th>IP</th>
      <th>Cluster</th>
    </tr>

    <tr v-for="vm in filteredVM">
      <td>{{ vm.name }}</td>
      <td>{{ vm.ip }}</td>
      <td>{{ vm.cluster }}</td>
    </tr>
  </table>

</div>

<script>
const API = "https://YOUR-WORKER-URL"

Vue.createApp({
  data() {
    return {
      vms: [],
      search: "",
      role: localStorage.getItem("role")
    }
  },

  computed: {
    filteredVM() {
      return this.vms.filter(vm =>
        vm.name.includes(this.search) ||
        vm.ip.includes(this.search)
      )
    }
  },

  async mounted() {
    const token = localStorage.getItem("token")

    const res = await fetch(API + "/api/vms", {
      headers: {
        Authorization: "Bearer " + token
      }
    })

    this.vms = await res.json()
  },

  methods: {
    async addVM() {
      const token = localStorage.getItem("token")

      await fetch(API + "/api/vms", {
        method: "POST",
        headers: {
          Authorization: "Bearer " + token
        },
        body: JSON.stringify({
          name: "vm-test",
          ip: "1.1.1.1"
        })
      })

      alert("VM added")
    }
  }
}).mount("#app")
</script>

<style>
.input {
  padding: 10px;
  background: #020617;
  border: 1px solid #1e293b;
  border-radius: 8px;
}
.btn {
  background: #2563eb;
  padding: 10px;
  border-radius: 8px;
}
</style>

</body>
</html>
