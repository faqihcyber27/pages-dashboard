<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white">

<div id="app" class="flex min-h-screen">

<!-- SIDEBAR -->
<div class="w-20 bg-slate-900 flex flex-col items-center py-4 space-y-6">

<div class="text-xl font-bold">⚡</div>

<div class="text-slate-400 text-xs text-center">
VM
</div>

</div>

<!-- MAIN -->
<div class="flex-1 p-4 space-y-4">

<!-- TOPBAR -->
<div class="flex justify-between items-center">

<input v-model="search" placeholder="Search VM / IP..."
class="input w-2/3"/>

<button @click="logout" class="text-red-400 text-sm">Logout</button>

</div>

<!-- SUMMARY -->
<div class="grid grid-cols-3 gap-3">

<div class="card">
<p>Total VM</p>
<p class="text-2xl font-bold">{{ vms.length }}</p>
</div>

<div class="card border border-green-500">
<p>PROD</p>
<p class="text-2xl text-green-400">{{ countEnv('PROD') }}</p>
</div>

<div class="card border border-blue-500">
<p>DEV</p>
<p class="text-2xl text-blue-400">{{ countEnv('DEV') }}</p>
</div>

</div>

<!-- FILTER -->
<div class="flex gap-2 text-sm">

<button @click="filterEnv='ALL'" class="chip">ALL</button>
<button @click="filterEnv='PROD'" class="chip">PROD</button>
<button @click="filterEnv='DEV'" class="chip">DEV</button>
<button @click="filterEnv='UAT'" class="chip">UAT</button>

</div>

<!-- ADD BUTTON -->
<button v-if="user.role==='admin'" @click="showForm=!showForm" class="btn">
+ Add VM
</button>

<!-- FORM -->
<div v-if="showForm" class="bg-slate-900 p-4 rounded-xl space-y-2">

<input v-model="form.name" placeholder="Name" class="input"/>
<input v-model="form.ip" placeholder="IP" class="input"/>
<input v-model="form.function" placeholder="Function" class="input"/>
<input v-model="form.environment" placeholder="Environment" class="input"/>
<input v-model="form.cluster" placeholder="Cluster" class="input"/>
<input v-model="form.host" placeholder="Host" class="input"/>
<input v-model="form.cpu" placeholder="CPU" class="input"/>
<input v-model="form.memory" placeholder="Memory" class="input"/>
<input v-model="form.os" placeholder="OS" class="input"/>
<input v-model="form.vlan" placeholder="VLAN" class="input"/>
<input v-model="form.storage" placeholder="Storage" class="input"/>

<div v-for="(d,i) in form.disk" class="flex gap-2">
<input v-model="form.disk[i]" class="input"/>
<button @click="removeDisk(i)">X</button>
</div>

<button @click="addDisk" class="text-blue-400 text-sm">+ Disk</button>
<button @click="addVM" class="btn">Save</button>

</div>

<!-- TABLE -->
<div class="bg-slate-900 rounded-xl overflow-hidden">

<table class="w-full text-xs">

<thead class="bg-slate-800 text-slate-400">
<tr>
<th class="p-2">VM</th>
<th>CPU</th>
<th>MEM</th>
<th>ENV</th>
<th>CLUSTER</th>
<th>HOST</th>
<th>DISK</th>
<th v-if="user.role==='admin'">ACT</th>
</tr>
</thead>

<tbody>

<tr v-for="vm in filteredVMs" class="border-t border-slate-800">

<td class="p-2">
<p class="font-bold">{{vm.name}}</p>
<p class="text-[10px] text-slate-400">{{vm.ip}}</p>
</td>

<td>{{vm.cpu}}</td>
<td>{{vm.memory}}</td>

<td>
<span class="badge"
:class="{
'bg-green-500': vm.environment==='PROD',
'bg-blue-500': vm.environment==='DEV',
'bg-yellow-500': vm.environment==='UAT'
}">
{{vm.environment}}
</span>
</td>

<td>{{vm.cluster}}</td>
<td class="text-[10px]">{{vm.host}}</td>

<td>
<span v-for="(d,i) in vm.disk" class="text-[10px] block">
D{{i+1}}: {{d}}
</span>
</td>

<td v-if="user.role==='admin'">
<button @click="deleteVM(vm.id)" class="text-red-400">X</button>
</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<script>
const API="https://worker-dashboard.jihadwajib68.workers.dev"
const {createApp}=Vue

createApp({

data(){
return{
user:{},
vms:[],
search:"",
filterEnv:"ALL",
showForm:false,
form:{
name:"",ip:"",function:"",environment:"",
cluster:"",host:"",cpu:"",memory:"",
os:"",vlan:"",storage:"",disk:[]
}
}
},

computed:{
filteredVMs(){
return this.vms.filter(v=>{
const matchSearch =
(v.name||"").toLowerCase().includes(this.search.toLowerCase()) ||
(v.ip||"").includes(this.search)

const matchEnv =
this.filterEnv==="ALL" || v.environment===this.filterEnv

return matchSearch && matchEnv
})
}
},

mounted(){
const u=localStorage.getItem("user")
if(!u) location="index.html"
this.user=JSON.parse(u)
this.loadVM()
},

methods:{

countEnv(e){
return this.vms.filter(v=>v.environment===e).length
},

async loadVM(){
const r=await fetch(API+"/vms")
this.vms=await r.json()
},

addDisk(){this.form.disk.push("")},
removeDisk(i){this.form.disk.splice(i,1)},

async addVM(){
await fetch(API+"/vms",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(this.form)
})

this.showForm=false
this.form={name:"",ip:"",function:"",environment:"",cluster:"",host:"",cpu:"",memory:"",os:"",vlan:"",storage:"",disk:[]}

this.loadVM()
},

async deleteVM(id){
await fetch(API+"/vms/"+id,{method:"DELETE"})
this.loadVM()
},

logout(){
localStorage.clear()
location="index.html"
}

}

}).mount("#app")
</script>

<style>
.input{
padding:10px;
background:#020617;
border:1px solid #1e293b;
border-radius:8px;
width:100%;
}

.btn{
background:#2563eb;
padding:10px;
border-radius:8px;
width:100%;
font-weight:bold;
}

.card{
background:#020617;
padding:12px;
border-radius:12px;
}

.badge{
padding:3px 6px;
border-radius:6px;
font-size:10px;
}

.chip{
background:#020617;
padding:6px 10px;
border-radius:6px;
}
</style>

</body>
</html>
