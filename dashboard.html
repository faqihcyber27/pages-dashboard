<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white">

<div id="app" class="p-4 space-y-4">

<div class="flex justify-between">
  <div>
    <h1 class="text-xl font-bold">VM Dashboard</h1>
    <p>{{ user.name }} ({{ user.role }})</p>
  </div>
  <button @click="logout" class="text-red-400">Logout</button>
</div>

<input v-model="search" placeholder="Search VM/IP" class="input"/>

<button v-if="user.role==='admin'" @click="showForm=!showForm" class="btn">
Add VM
</button>

<div v-if="showForm" class="bg-slate-900 p-3 rounded space-y-2">

<input v-model="form.name" placeholder="Name" class="input"/>
<input v-model="form.ip" placeholder="IP" class="input"/>
<input v-model="form.function" placeholder="Function" class="input"/>
<input v-model="form.environment" placeholder="Environment" class="input"/>
<input v-model="form.cluster" placeholder="Cluster" class="input"/>
<input v-model="form.host" placeholder="Host" class="input"/>
<input v-model="form.cpu" placeholder="CPU" class="input"/>
<input v-model="form.memory" placeholder="Memory" class="input"/>
<input v-model="form.os" placeholder="OS" class="input"/>
<input v-model="form.vlan" placeholder="VLAN" class="input"/>
<input v-model="form.storage" placeholder="Storage" class="input"/>

<div v-for="(d,i) in form.disk" class="flex gap-2">
  <input v-model="form.disk[i]" class="input"/>
  <button @click="removeDisk(i)">X</button>
</div>

<button @click="addDisk">+ Disk</button>
<button @click="addVM" class="btn">Save</button>

</div>

<table class="w-full text-sm">
<tr>
<th>Name</th>
<th>IP</th>
<th>Env</th>
<th>Disk</th>
<th v-if="user.role==='admin'">Action</th>
</tr>

<tr v-for="vm in filteredVMs">
<td>{{vm.name}}</td>
<td>{{vm.ip}}</td>
<td>{{vm.environment}}</td>
<td>
<div v-for="(d,i) in vm.disk">
D{{i+1}}: {{d}}
</div>
</td>

<td v-if="user.role==='admin'">
<button @click="deleteVM(vm.id)">Delete</button>
</td>
</tr>
</table>

</div>

<script>
const API="https://worker-dashboard.jihadwajib68.workers.dev"
const {createApp}=Vue

createApp({

data(){
return{
user:{},
vms:[],
search:"",
showForm:false,
form:{
name:"",ip:"",function:"",environment:"",
cluster:"",host:"",cpu:"",memory:"",
os:"",vlan:"",storage:"",
disk:[]
}
}
},

computed:{
filteredVMs(){
return this.vms.filter(v=>
(v.name||"").toLowerCase().includes(this.search.toLowerCase()) ||
(v.ip||"").includes(this.search)
)
}
},

mounted(){
const u=localStorage.getItem("user")
if(!u) location="index.html"
this.user=JSON.parse(u)
this.loadVM()
},

methods:{

async loadVM(){
const r=await fetch(API+"/vms")
this.vms=await r.json()
},

addDisk(){this.form.disk.push("")},
removeDisk(i){this.form.disk.splice(i,1)},

async addVM(){
console.log("FORM:",this.form)

const res=await fetch(API+"/vms",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(this.form)
})

const data=await res.json()
console.log("RESPONSE:",data)

if(!res.ok){
alert(data.error||"Gagal")
return
}

alert("VM berhasil ditambah")

this.showForm=false
this.form={name:"",ip:"",function:"",environment:"",cluster:"",host:"",cpu:"",memory:"",os:"",vlan:"",storage:"",disk:[]}

this.loadVM()
},

async deleteVM(id){
if(!confirm("Delete?")) return
await fetch(API+"/vms/"+id,{method:"DELETE"})
this.loadVM()
},

logout(){
localStorage.clear()
location="index.html"
}

}

}).mount("#app")
</script>

<style>
.input{width:100%;padding:10px;background:#020617;border:1px solid #1e293b;border-radius:8px}
.btn{width:100%;background:#2563eb;padding:10px;border-radius:8px}
</style>

</body>
</html>
