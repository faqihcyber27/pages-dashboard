<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#020617] text-white">

<div id="app" class="p-4 space-y-4">

<div class="flex justify-between">
<h1 class="text-lg font-bold">VM Dashboard</h1>
<button @click="exportCSV" class="btn">Download CSV</button>
</div>

<div v-for="vm in vms" class="card">

<p class="font-semibold">{{vm.name}}</p>
<p class="text-xs text-slate-400">{{vm.ip}}</p>

<div class="grid grid-cols-2 text-xs mt-2">
<div>{{vm.cpu}} CPU</div>
<div>{{vm.memory}} GB</div>
</div>

</div>

</div>

<script>
const API="https://worker-dashboard.jihadwajib68.workers.dev"

Vue.createApp({
data(){return{vms:[]}},

mounted(){this.loadVM()},

methods:{

async loadVM(){
const r=await fetch(API+"/vms")
this.vms=await r.json()
},

exportCSV(){
let csv="name,ip,cpu,memory\n"
this.vms.forEach(vm=>{
csv+=`${vm.name},${vm.ip},${vm.cpu},${vm.memory}\n`
})

const blob=new Blob([csv])
const url=URL.createObjectURL(blob)
const a=document.createElement("a")
a.href=url
a.download="vm.csv"
a.click()
}

}
}).mount("#app")
</script>

<style>
.card{background:#020617;border:1px solid #1e293b;padding:12px;border-radius:10px}
.btn{background:#2563eb;padding:8px;border-radius:6px}
</style>

</body>
</html>
