<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-[#020617] text-white">

<div id="app" class="min-h-screen p-4 space-y-4">

<!-- HEADER -->
<div class="flex justify-between items-center">

  <div>
    <h1 class="text-xl font-bold">VM Dashboard</h1>
    <p class="text-xs text-slate-400">Infrastructure Overview</p>
  </div>

  <button @click="logout" class="text-xs text-red-400">
    Logout
  </button>

</div>

<!-- SEARCH -->
<input v-model="search" placeholder="Search VM / IP"
class="input"/>

<!-- FILTER -->
<div class="flex gap-2 text-xs">
<button @click="filter='ALL'" :class="chip('ALL')">ALL</button>
<button @click="filter='PRODUCTION'" :class="chip('PRODUCTION')">PROD</button>
<button @click="filter='GO-PRODUCTION'" :class="chip('GO-PRODUCTION')">GO-PROD</button>
</div>

<!-- LIST -->
<div class="space-y-3">

<div v-for="vm in filteredVMs" class="vm-card">

<!-- HEADER -->
<div class="flex justify-between items-start">

  <div>
    <p class="text-sm font-semibold">{{vm.name}}</p>
    <p class="text-[11px] text-slate-400">{{vm.ip}}</p>
  </div>

  <span 
  class="badge"
  :class="vm.environment==='PRODUCTION'?'prod':'goprod'">
  {{vm.environment}}
  </span>

</div>

<!-- INFO GRID -->
<div class="grid grid-cols-2 gap-3 mt-4 text-xs">

  <div class="info"><span>Platform</span>{{vm.platform}}</div>
  <div class="info"><span>Function</span>{{vm.function}}</div>

  <div class="info"><span>CPU</span>{{vm.cpu}}</div>
  <div class="info"><span>Memory</span>{{vm.memory}} GB</div>

  <div class="info"><span>Cluster</span>{{vm.cluster}}</div>
  <div class="info"><span>Host</span>{{vm.host}}</div>

  <div class="info"><span>OS</span>{{vm.os}}</div>
  <div class="info"><span>VLAN</span>{{vm.vlan}}</div>

  <div class="info"><span>Storage</span>{{vm.storage}}</div>

</div>

<!-- DISK -->
<div class="mt-4 flex flex-wrap gap-2">
<span v-for="(d,i) in vm.disk" class="disk">
💽 {{d}} GB
</span>
</div>

</div>

</div>

</div>

<script>
const API="https://worker-dashboard.jihadwajib68.workers.dev"

Vue.createApp({

data(){
return{
vms:[],
search:"",
filter:"ALL"
}
},

computed:{
filteredVMs(){
return this.vms.filter(v=>{
return (
(v.name||"").toLowerCase().includes(this.search.toLowerCase()) ||
(v.ip||"").includes(this.search)
) &&
(this.filter==="ALL" || v.environment===this.filter)
})
}
},

mounted(){
this.loadVM()
},

methods:{

async loadVM(){
const r = await fetch(API+"/vms")
this.vms = await r.json()
},

chip(e){
return this.filter===e ? "chip active":"chip"
},

logout(){
localStorage.clear()
window.location="index.html"
}

}

}).mount("#app")
</script>

<style>

/* INPUT */
.input{
width:100%;
padding:12px;
background:#020617;
border:1px solid #1e293b;
border-radius:10px;
}

/* CARD */
.vm-card{
background:linear-gradient(180deg,#020617,#020617);
border:1px solid #1e293b;
border-radius:14px;
padding:16px;
transition:0.2s;
}

.vm-card:hover{
border-color:#2563eb;
box-shadow:0 0 0 1px rgba(37,99,235,0.2);
}

/* INFO */
.info span{
display:block;
font-size:10px;
color:#64748b;
}

/* BADGE */
.badge{
padding:4px 8px;
border-radius:6px;
font-size:10px;
}

.prod{
background:#022c22;
color:#4ade80;
}

.goprod{
background:#3f1d02;
color:#facc15;
}

/* DISK */
.disk{
background:#020617;
border:1px solid #334155;
padding:4px 8px;
border-radius:6px;
font-size:10px;
}

/* FILTER */
.chip{
padding:6px 10px;
background:#020617;
border-radius:6px;
border:1px solid #1e293b;
}

.active{
background:#2563eb;
}

</style>

</body>
</html>
